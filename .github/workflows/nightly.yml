# DozenOS nightly BUILD + STORE workflow. Unlike upstream's store-only
# nightly repo, this builds every C2 package (plus the linux-kernel family)
# in this run, feeds the resulting .debs into an ephemeral in-job apt repo,
# builds every flavor, and publishes one GitHub Release in this same repo.
# The full in-run rebuild (never a scan of past dozenos-build CI artifacts)
# is what guarantees a coherent, complete .deb set -- see
# dozenos-rebrand/ISO-BUILD.md §5 and DISTRIBUTION.md §2(b). The deb cache
# (dozenos-rebrand/DEB-CACHE.md) keeps this cheap without weakening that
# guarantee: every matrix leg either key-hits its full stored unit set or
# rebuilds it in-run.
#
# Helper scripts (specs in dozenos-rebrand/DISTRIBUTION.md, ISO-BUILD.md,
# SB-SIGNING.md):
#   dozenos-rebrand/release/make-ephemeral-apt-repo.sh -- ephemeral apt repo
#   dozenos-rebrand/release/inject-mok-cert.sh         -- MOK inject/shred
#   dozenos-rebrand/release/gen-version-json.sh        -- version.json
#   dozenos-rebrand/release/sign-and-publish.sh        -- minisign + gh release
#
# Secrets/vars (names authoritative in dozenos-rebrand/CI-SECRETS.md):
#   vars.BUILD_APP_ID + secrets.BUILD_APP_PRIVATE_KEY -- org GitHub App;
#     every cross-repo step mints a short-lived (~1h) installation token at
#     the start of its own job, scoped to exactly the repos it touches.
#   secrets.MOK_SIGNING_KEY / MOK_SIGNING_CERT -- optional; unsigned kernel
#     when unset.
#   secrets.MINISIGN_SECRET_KEY / MINISIGN_PASSWORD -- required by
#     sign-and-publish.sh, which fails loudly if unset.
#   secrets.GITHUB_TOKEN -- same-repo Release publish + version.json commit
#     (DISTRIBUTION.md §7).
#   vars.BUILD_BY -- build-identity string (non-secret).
#
# No `uses: vyos/*` anywhere in this file (dozenos-rebrand/WORKFLOW-POLICY.md
# hard rule).
name: DozenOS nightly build

on:
  # Trigger-based: mirror self-syncs and incremental rebuilds send
  # dozenos-image-build-requested; check-changes below dedupes so identical
  # mirror state never builds twice. The weekly cron is a forced heartbeat:
  # the ISO also bakes in packages from the Debian archive (resolved at
  # build time), so a periodic rebuild picks up Debian security updates
  # that no dozenos/* mirror change would ever signal.
  repository_dispatch:
    # dozenos-incremental-rebuild-complete is the legacy event name; drop it
    # only after confirming no sender remains (grep the mirrors' sync.yml +
    # rebuild-dispatch.yml).
    types: [dozenos-image-build-requested, dozenos-incremental-rebuild-complete]
  schedule:
    # Mondays, ~1h after the shared mirror self-sync cron ('17 3 * * *') and
    # off the top of the hour (GitHub scheduler pile-up).
    - cron: '17 4 * * 1'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version string to build/tag instead of the computed "YYYY.MM.DD-HHMM-rolling" (e.g. for a manual re-run of a specific nightly). Leave blank for the normal auto-computed version.'
        required: false
        type: string

# One nightly in flight at a time: overlapping runs would race on the same
# default-branch version.json commit and could collide on the Release tag.
# Never cancel a build already in progress -- a second run queues instead.
concurrency:
  group: dozenos-nightly-build
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # check-changes: build only when a dozenos/* mirror actually moved.
  # Snapshots every mirror's rolling HEAD -- including dozenos-build and
  # dozenos-rebrand, whose tooling changes the ISO too -- and compares the
  # set against mirror-state.json (this repo's default branch), the SHAs
  # recorded when the last ISO was built. Whatever synced by the time a
  # trigger lands is captured in one snapshot, so a day's changes collapse
  # into one build; a mirror that syncs mid-build differs from the recorded
  # baseline at the next tick. workflow_dispatch always forces a build.
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.gate.outputs.changed }}
      shas: ${{ steps.gate.outputs.shas }}
    steps:
      - name: Checkout dozenos-nightly-build (for the recorded baseline)
        uses: actions/checkout@v7

      # Enumerating org repos + reading each mirror's HEAD is a cross-repo
      # read. No `repositories:` filter: this step genuinely needs every
      # installation repo, since the point is enumerating the mirror set
      # without a hand-kept list (CI-SECRETS.md §4).
      - name: Mint GitHub App token (org-wide mirror snapshot)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos

      - name: Snapshot mirror HEADs and compare to last-built baseline
        id: gate
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail

          # Every dozenos/* repo with a `rolling` branch == the mirror set;
          # enumerating by branch auto-covers mirrors added/removed later.
          # dozenos-nightly-build (this repo) is skipped explicitly so the
          # version.json/mirror-state.json commits below can never feed back
          # into this fingerprint (which would self-trigger every tick).
          declare -A shas
          while read -r r; do
            [ -n "$r" ] || continue
            [ "$r" = "dozenos-nightly-build" ] && continue
            if sha=$(gh api "repos/dozenos/$r/commits/rolling" --jq '.sha' 2>/dev/null); then
              [ -n "$sha" ] && shas["$r"]="$sha"
            fi
          done < <(gh api --paginate orgs/dozenos/repos --jq '.[].name' | sort -u)

          # dozenos-rebrand has no `rolling` branch (toolkit repo, not a
          # mirror) -- track its default-branch HEAD instead; its transform/
          # overlay/flavor changes alter the ISO as much as any package.
          if rsha=$(gh api "repos/dozenos/dozenos-rebrand/commits/HEAD" --jq '.sha' 2>/dev/null); then
            [ -n "$rsha" ] && shas["dozenos-rebrand"]="$rsha"
          fi

          # Canonical (keys sorted) JSON so string equality against the
          # stored baseline is stable.
          current=$(for k in "${!shas[@]}"; do
              printf '%s\t%s\n' "$k" "${shas[$k]}"
            done | jq -R -s 'split("\n") | map(select(length>0) | split("\t"))
              | map({(.[0]): .[1]}) | add // {}' | jq -Sc .)
          echo "I: current mirror fingerprint ($(printf '%s' "$current" | jq 'length') repos): $current"

          baseline='{}'
          if [ -f mirror-state.json ]; then
            baseline=$(jq -Sc . mirror-state.json)
          fi

          # Emit the OBSERVED set for build-iso to persist verbatim after a
          # successful build; persisting this snapshot (not a fresh re-read)
          # is what makes a mid-build sync roll to the next tick rather than
          # be silently swallowed.
          echo "shas=$current" >> "$GITHUB_OUTPUT"

          # workflow_dispatch = "build now"; schedule = the weekly heartbeat
          # that must build even with an unchanged fingerprint (Debian
          # archive drift is invisible to the mirror-SHA gate). Only
          # repository_dispatch is gate-checked.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            echo "I: ${{ github.event_name }} -- forcing a build regardless of the gate."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$current" = "$baseline" ]; then
            echo "I: mirror fingerprint unchanged since the last published image -- skipping this build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "I: mirror change detected since the last nightly ISO -- building. Diff (baseline vs current):"
            diff <(printf '%s' "$baseline" | jq -r 'to_entries[] | "\(.key) \(.value)"' | sort) \
                 <(printf '%s' "$current"  | jq -r 'to_entries[] | "\(.key) \(.value)"' | sort) || true
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # set-version: one VERSION string shared by every later job -- the ISO
  # build, signing, version.json, and release tag must all agree.
  set-version:
    needs: check-changes
    if: needs.check-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Compute nightly version string
        id: v
        env:
          # Via env, never ${{ }}-interpolated into the script body: a
          # dispatch input is typed by whoever dispatched and must not be
          # able to inject shell here.
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          set -euo pipefail
          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
            echo "I: using dispatch override version: $VERSION"
          else
            # Passed explicitly to build-dozenos-image's --version: its own
            # default does not match DozenOS's release/tag scheme
            # (DISTRIBUTION.md §3).
            VERSION="$(date -u +%Y.%m.%d-%H%M)-rolling"
            echo "I: computed version: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # discover: the FULL package list, every night (a release needs every
  # package, not a diff like dozenos-build's own rebuild-packages.yml).
  # linux-kernel is one matrix entry: its bespoke build.py builds the kernel
  # plus every OOT module in one invocation when given no --packages filter.
  #
  # shim-signed is EXCLUDED: its Build-Depends pins
  # `shim-unsigned (= <ver>+dozenos1)`, a Secure Boot shim DozenOS
  # deliberately does not mirror or rebuild -- the ISO uses Debian's stock
  # Microsoft-signed shim-signed instead (dozenos-rebrand/SB-SIGNING.md) --
  # so the recipe can never satisfy its build deps here and would fail every
  # run, blocking the strict `needs: build-packages` gate below. The recipe
  # dir stays in-tree only for 1:1 upstream mirror parity.
  #
  # unionfs-fuse is EXCLUDED: the recipe's 3.6 ships only /usr/bin/unionfs,
  # apt prefers it (3.6 > 1.0-1) over Debian bookworm's stock package, and
  # losing Debian's /usr/bin/unionfs-fuse compat name breaks EVERY config
  # commit in the built image -- vyatta-cfg execs that exact path, the
  # session unionfs mount ENOENTs, and the committed active config silently
  # degrades to the session diff (root cause of the 50/51 test-config-load
  # failures, 2026-07-11). The ISO must install Debian's stock package.
  # BOOKWORM-SCOPED: upstream added this recipe for the next Debian base
  # (which drops the old-name package). When the base moves past bookworm,
  # UN-exclude it here + rebuild-packages.yml + rebuild-dispatch.yml and
  # solve the binary-name mismatch (recipe compat symlink, or upstream's
  # vyatta-cfg exec-path fix -- check upstream first).
  discover:
    needs: check-changes
    if: needs.check-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - name: Mint GitHub App token (dozenos-build checkout)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-build

      - name: Checkout dozenos-build
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-build
          ref: rolling
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-build

      - name: List every C2 package (full nightly rebuild, not a diff)
        id: set
        working-directory: dozenos-build
        run: |
          set -euo pipefail
          # vpp is NOT a separate matrix leg: the linux-kernel leg already
          # builds it (accel-ppp-ng needs the vpp libraries, so
          # build-accel-ppp-ng.sh builds vpp and copies its .debs into the
          # linux-kernel recipe dir, which that leg's artifact upload ships).
          # A separate vpp leg built vpp a second time from a different
          # commit of the moving stable/2510 branch; the near-duplicate .deb
          # set then failed make-ephemeral-apt-repo.sh's stanza==.deb-count
          # guard and sank the whole ISO build.
          others=$(find scripts/package-build -mindepth 1 -maxdepth 1 -type d \
            ! -name linux-kernel ! -name shim-signed ! -name vpp \
            ! -name unionfs-fuse -printf '%f\n' | sort)
          packages=$(printf '%s\nlinux-kernel\n' "$others" | jq -R . | jq -sc .)
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "I: full nightly package matrix (vpp built inside linux-kernel, not a separate leg): $packages"

  # build-packages: same build-step shape as dozenos-build's own
  # rebuild-packages.yml / rebuild-dispatch.yml (container
  # ghcr.io/dozenos/dozenos-build:rolling, /dozenos + /dozenos-rebrand
  # mounts, deb-<pkg> artifact upload).
  build-packages:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.discover.outputs.packages) }}
    steps:
      # One token for both checkouts below -- both happen in this job's
      # first minutes, well inside the token's ~1h lifetime.
      - name: Mint GitHub App token (dozenos-build + dozenos-rebrand checkouts)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-build,dozenos-rebrand

      - name: Checkout dozenos-build
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-build
          ref: rolling
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-build

      # Every C2 recipe's pre_build_hook shells out to
      # /dozenos-rebrand/rename-transform.sh at that exact absolute path
      # inside the build container.
      - name: Checkout dozenos-rebrand
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-rebrand

      # deb-cache (dozenos-rebrand/DEB-CACHE.md): derive a content key from
      # the unit's inputs and reuse the .deb set stored under it by any
      # earlier run. Every failure mode degrades to a full rebuild, never to
      # a wrong ISO: key failure => build without cache; probe failure or
      # missing cache repo => MISS => build; store failure =>
      # continue-on-error. The complete-set guarantee holds by construction:
      # every leg either HITs the full unit set or rebuilds it in-run.
      - name: Compute deb-cache key
        id: cachekey
        run: |
          set -euo pipefail
          if KEY=$(dozenos-rebrand/release/deb-cache.sh key \
                --unit "${{ matrix.pkg }}" \
                --build dozenos-build \
                --rebrand dozenos-rebrand \
                --manifest "$RUNNER_TEMP/deb-cache-manifest.json"); then
            echo "I: deb-cache key for ${{ matrix.pkg }}: $KEY"
            echo "key=$KEY" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::deb-cache key computation failed for ${{ matrix.pkg }} -- building without cache (fail-safe)"
            echo "key=" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN suffices: the cache repo is public and this is a read.
      - name: Probe deb cache
        id: probe
        if: steps.cachekey.outputs.key != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if dozenos-rebrand/release/deb-cache.sh probe \
              --unit "${{ matrix.pkg }}" \
              --key "${{ steps.cachekey.outputs.key }}" \
              --dest "dozenos-build/scripts/package-build/${{ matrix.pkg }}"; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ${{ matrix.pkg }}
        if: steps.probe.outputs.hit != 'true'
        run: |
          set -euo pipefail
          if [ "${{ matrix.pkg }}" = "linux-kernel" ]; then
            # One build.py invocation, no --packages filter: kernel plus
            # every OOT module block.
            docker run --rm \
              -v "${{ github.workspace }}/dozenos-build:/dozenos" \
              -v "${{ github.workspace }}/dozenos-rebrand:/dozenos-rebrand" \
              -w /dozenos \
              ghcr.io/dozenos/dozenos-build:rolling \
              bash -c "cd scripts/package-build/linux-kernel && python3 build.py"
          else
            docker run --rm \
              -v "${{ github.workspace }}/dozenos-build:/dozenos" \
              -v "${{ github.workspace }}/dozenos-rebrand:/dozenos-rebrand" \
              -w /dozenos \
              ghcr.io/dozenos/dozenos-build:rolling \
              bash -c "cd scripts/package-build/${{ matrix.pkg }} && python3 ../build.py"
          fi

      # Minted AFTER the (possibly multi-hour) build step on purpose: an App
      # token lives ~1h, so a pre-build mint would be expired by the time
      # the kernel leg gets here. continue-on-error on both steps: a cache
      # write failure must never fail the nightly -- it only means the next
      # run rebuilds this unit again.
      - name: Mint GitHub App token (deb-cache store)
        id: cache_token
        if: steps.cachekey.outputs.key != '' && steps.probe.outputs.hit != 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-deb-cache

      - name: Store built debs into deb cache
        if: steps.cache_token.outcome == 'success' && steps.cachekey.outputs.key != '' && steps.probe.outputs.hit != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.cache_token.outputs.token }}
        run: |
          set -euo pipefail
          dozenos-rebrand/release/deb-cache.sh store \
            --unit "${{ matrix.pkg }}" \
            --key "${{ steps.cachekey.outputs.key }}" \
            --debs "dozenos-build/scripts/package-build/${{ matrix.pkg }}" \
            --manifest "$RUNNER_TEMP/deb-cache-manifest.json"

      # Uploads identically on both paths: a probe HIT lands the cached
      # .debs in the same recipe dir a fresh build writes to.
      - name: Upload built package(s)
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.pkg }}
          path: dozenos-build/scripts/package-build/${{ matrix.pkg }}/*.deb
          # error, not warn: a leg that "succeeds" with zero .debs must fail
          # the nightly loudly, not silently thin out the ISO's apt pool.
          if-no-files-found: error
          # Consumed once, later in this same run, by build-iso.
          retention-days: 1

  # discover-flavors: enumerate flavors from dozenos-rebrand's
  # flavors/<subdir>/<flavor>.toml tree (rebrand-owned configuration; the
  # dozenos-build mirror's own data/build-flavors/ is upstream transform
  # output and is NOT used). Dropping a new toml into rebrand adds a
  # build-image matrix leg with no workflow change. Subdirectories let the
  # SAME flavor basename exist twice with different contents -- the toml
  # basename is the flavor name burned into the image, which is what
  # `add system image` compares -- e.g. a future flavors/upgrade/aws.toml
  # upgrading systems installed from the flavors/fresh-install/aws.toml vmdk.
  discover-flavors:
    needs: check-changes
    if: needs.check-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - name: Mint GitHub App token (dozenos-rebrand checkout)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-rebrand

      - name: Checkout dozenos-rebrand
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-rebrand

      - name: Build flavor matrix from flavors/*/*.toml
        id: m
        run: |
          set -euo pipefail
          matrix=$(
            cd dozenos-rebrand/flavors
            # nullglob: with no matching toml the loop must produce nothing
            # (not one literal "*/*.toml" entry that would dodge the
            # empty-matrix check below).
            shopt -s nullglob
            for f in */*.toml; do
              subdir="${f%%/*}"
              flavor="$(basename "$f" .toml)"
              printf '{"flavor":"%s","subdir":"%s"}\n' "$flavor" "$subdir"
            done | jq -sc .
          )
          if [ "$matrix" = "[]" ] || [ -z "$matrix" ]; then
            echo "::error::no flavor tomls found under dozenos-rebrand/flavors/*/" >&2
            exit 1
          fi
          echo "I: flavor matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # build-image: one matrix leg per (flavor, subdir): assemble the ephemeral
  # apt repo from every package just built, build that flavor with an
  # explicit --version, and upload exactly the files manifest.json lists as
  # artifacts for the publish job to sign and release.
  build-image:
    needs: [check-changes, set-version, build-packages, discover-flavors]
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      # One broken flavor must not sink the others' nightly artifacts;
      # publish still requires success() of this job as a whole, so a failed
      # leg fails the run loudly (a nightly with a silently missing flavor
      # would poison the change-gate baseline).
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-flavors.outputs.matrix) }}
    env:
      VERSION: ${{ needs.set-version.outputs.version }}
      DEBIAN_MIRROR: http://deb.debian.org/debian/
      DEBIAN_SECURITY_MIRROR: http://deb.debian.org/debian-security
      # The `secrets` context is not available in step-level `if:` (GitHub
      # rejects the whole workflow) -- mirror the two MOK secrets into
      # job-level env so the signed-vs-unsigned guards below can test
      # `env.*`. Empty when the org secrets are absent = the unsigned case.
      MOK_SIGNING_KEY: ${{ secrets.MOK_SIGNING_KEY }}
      MOK_SIGNING_CERT: ${{ secrets.MOK_SIGNING_CERT }}
    steps:
      # One token for both checkouts. The job can outlive the token's ~1h
      # lifetime, but its last use is the second checkout, minutes in. Do
      # not add a late step that reuses this token -- mint a fresh one.
      - name: Mint GitHub App token (dozenos-build + dozenos-rebrand checkouts)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-build,dozenos-rebrand

      - name: Checkout dozenos-build
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-build
          ref: rolling
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-build

      - name: Checkout dozenos-rebrand
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-rebrand

      # All deb-<pkg> artifacts from THIS run (no run-id: download-artifact
      # defaults to the current run), merged flat -- the full,
      # guaranteed-fresh package set.
      - name: Download all built .deb artifacts from this run
        uses: actions/download-artifact@v8
        with:
          pattern: 'deb-*'
          path: dozenos-debs
          merge-multiple: true

      # Does not run at all when the org secrets are not configured --
      # identical to an unsigned-kernel build (dozenos-rebrand/SB-SIGNING.md).
      - name: Inject MOK signing key+cert
        if: ${{ env.MOK_SIGNING_KEY != '' && env.MOK_SIGNING_CERT != '' }}
        run: dozenos-rebrand/release/inject-mok-cert.sh dozenos-build

      # The ephemeral apt repo is built inside this same container
      # invocation and consumed over localhost HTTP, NOT via its file://
      # URL: apt runs inside the live-build chroot, whose filesystem root
      # does not contain the container's /tmp, so a container-side file://
      # path 404s on every index fetch there (apt Ign-s the missing Packages
      # index but HARD-FAILS `lb build` on the missing Sources index). The
      # chroot does share the container network namespace, so a
      # 127.0.0.1-bound server is reachable from chroot apt at every stage.
      # Do not revisit file:// (a file://-into-chroot seeding variant was
      # tried and races lb clean, the bootstrap cache restore, and
      # debootstrap itself). See make-ephemeral-apt-repo.sh's CONSUMPTION
      # WARNING.
      - name: Build signed DozenOS ${{ matrix.flavor }} image (${{ matrix.subdir }})
        run: |
          docker run --rm \
            --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged \
            -v "${{ github.workspace }}/dozenos-build:/dozenos" \
            -v "${{ github.workspace }}/dozenos-rebrand:/dozenos-rebrand" \
            -v "${{ github.workspace }}/dozenos-debs:/dozenos-debs:ro" \
            -w /dozenos \
            -e BUILD_BY="${{ vars.BUILD_BY }}" \
            -e DEBIAN_MIRROR="${{ env.DEBIAN_MIRROR }}" \
            -e DEBIAN_SECURITY_MIRROR="${{ env.DEBIAN_SECURITY_MIRROR }}" \
            -e VERSION="${{ env.VERSION }}" \
            -e BUILD_FLAVOR="${{ matrix.flavor }}" \
            -e DOZENOS_BUILD_FLAVORS_DIR="/dozenos-rebrand/flavors/${{ matrix.subdir }}" \
            ghcr.io/dozenos/dozenos-build:rolling \
            bash -c '
              set -euo pipefail
              DOZENOS_MIRROR=""
              if [ -n "$(find /dozenos-debs -name "*.deb" -print -quit 2>/dev/null)" ]; then
                /dozenos-rebrand/release/make-ephemeral-apt-repo.sh /dozenos-debs /tmp/dozenos-apt-repo >/dev/null
                # localhost HTTP, not file:// -- see this step-s header
                # comment. Readiness is verified before lb build starts; if
                # the server ever died mid-build, apt would fail the job
                # loudly rather than build a wrong ISO. (Comments in this
                # single-quoted block must stay apostrophe-free.)
                (cd /tmp/dozenos-apt-repo && exec python3 -m http.server --bind 127.0.0.1 8099 >/tmp/dozenos-apt-http.log 2>&1) &
                for i in $(seq 1 50); do
                  curl -fsS -o /dev/null http://127.0.0.1:8099/dists/rolling/Release && break
                  sleep 0.2
                done
                curl -fsS -o /dev/null http://127.0.0.1:8099/dists/rolling/Release || { echo "E: ephemeral apt repo HTTP server did not come up"; exit 1; }
                DOZENOS_MIRROR="[trusted=yes] http://127.0.0.1:8099"
                echo "I: ephemeral DozenOS apt repo built + served -- --dozenos-mirror \"$DOZENOS_MIRROR\""
              else
                echo "W: no .deb files found under /dozenos-debs -- unexpected for a full nightly rebuild; building with an empty --dozenos-mirror anyway rather than failing the whole nightly"
              fi
              # --build-type is intentionally NOT passed: nightlies stay
              # typed as development (the data/defaults.toml fallback), which
              # affects os-release naming and the apt release-train pin.
              # --version IS passed explicitly -- the tool-s own default does
              # not match the DozenOS release scheme.
              sudo --preserve-env ./build-dozenos-image \
                --architecture amd64 \
                --build-by "$BUILD_BY" \
                --debian-mirror "$DEBIAN_MIRROR" \
                --debian-security-mirror "$DEBIAN_SECURITY_MIRROR" \
                --version "$VERSION" \
                --dozenos-mirror "$DOZENOS_MIRROR" \
                "$BUILD_FLAVOR"
            '

      # Always runs (even if the build failed) to shrink the window the
      # decoded private key sits in this job's worktree.
      - name: Clean up injected MOK key
        if: ${{ always() && env.MOK_SIGNING_KEY != '' && env.MOK_SIGNING_CERT != '' }}
        run: dozenos-rebrand/release/inject-mok-cert.sh dozenos-build --cleanup

      # build-dozenos-image ran under sudo inside the container, so the
      # build tree comes back root-owned and minisign (running as the runner
      # user, writing <iso>.minisig next to the ISO) would die with
      # "Permission denied". Reclaim ownership before anything writes there.
      - name: Reclaim ownership of build artifacts
        run: sudo chown -R "$(id -u):$(id -g)" dozenos-build/build

      # manifest.json's "artifacts" is exactly the flavor toml's declared
      # image_format list (intermediates like the .raw behind a qcow2 are
      # never listed), so uploading manifest-listed files implements "only
      # formats the toml mentions get released" with zero per-flavor logic.
      # meta.json carries the flavor name to the publish job, avoiding
      # brittle filename parsing there.
      - name: Collect manifest-declared artifacts
        run: |
          set -euo pipefail
          python3 - "${{ matrix.flavor }}" "${{ matrix.subdir }}" <<'PYEOF'
          import json, shutil, sys, os
          flavor, subdir = sys.argv[1], sys.argv[2]
          m = json.load(open('dozenos-build/build/manifest.json'))
          arts = m.get('artifacts') or []
          if not arts:
              print('::error::manifest.json lists no artifacts', file=sys.stderr)
              sys.exit(1)
          os.makedirs('image-out', exist_ok=True)
          for a in arts:
              src = os.path.join('dozenos-build/build', a)
              if not os.path.isfile(src):
                  print(f'::error::manifest artifact missing on disk: {src}', file=sys.stderr)
                  sys.exit(1)
              shutil.copy(src, 'image-out/')
              print(f'I: collected {a}')
          with open('image-out/meta.json', 'w') as f:
              json.dump({'flavor': flavor, 'subdir': subdir, 'artifacts': arts}, f)
          PYEOF

      - name: Upload image artifacts for the publish job
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.subdir }}-${{ matrix.flavor }}
          path: image-out/
          retention-days: 3
          if-no-files-found: error

  # test-config-load: boot the generic ISO in QEMU and load every smoketest
  # config against it (`make testc`) before anything is published. Only the
  # generic flavor is tested: the other flavors differ in packaging/format,
  # not in config-load behavior, and one QEMU pass is the whole gate.
  # image-fresh-install-generic is download-artifact'd by exact name, so a
  # flavor-toml rename/move that drops it fails this job loudly instead of
  # silently unguarding publish.
  test-config-load:
    needs: build-image
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Mint GitHub App token (dozenos-build checkout)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-build

      # The test harness (scripts/check-qemu-install, `make testc`) lives in
      # dozenos-build, not in this repo.
      - name: Checkout dozenos-build
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-build
          ref: rolling
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-build

      - name: Download generic image artifact
        uses: actions/download-artifact@v8
        with:
          name: image-fresh-install-generic
          path: image

      # The Makefile's ISO_PATH default is build/live-image-amd64.hybrid.iso;
      # the artifact carries the release-named ISO, so stage it there.
      - name: Stage generic ISO at the Makefile's ISO_PATH
        run: |
          set -euo pipefail
          iso=$(jq -r '.artifacts[] | select(endswith(".iso"))' image/meta.json)
          mkdir -p dozenos-build/build
          mv "image/$iso" dozenos-build/build/live-image-amd64.hybrid.iso

      - name: DozenOS config load tests
        run: |
          docker run --rm \
            --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged \
            -v "${{ github.workspace }}/dozenos-build:/dozenos" \
            -w /dozenos \
            ghcr.io/dozenos/dozenos-build:rolling \
            bash -c 'sudo make testc'

  # publish: gather every flavor's artifacts, minisign each file, generate
  # the multi-artifact version.json, publish ONE GitHub Release, and commit
  # version.json + mirror-state.json back to the default branch as the
  # stable "latest" pointer / change-gate baseline (DISTRIBUTION.md §4). A
  # single job by design: exactly one `gh release create` may happen per tag,
  # and the baseline must only advance when EVERY flavor built (a
  # skipped/failed leg skips this job, so the next tick rebuilds) AND the
  # generic ISO passed the config-load gate above.
  publish:
    needs: [check-changes, set-version, build-image, test-config-load]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      # For gh release create (GITHUB_TOKEN, same-repo -- DISTRIBUTION.md §7)
      # and the version.json commit-back below.
      contents: write
    env:
      VERSION: ${{ needs.set-version.outputs.version }}
    steps:
      # Self-checkout, needed for the commit-back step and minisign.pub.
      - name: Checkout dozenos-nightly-build (this repo)
        uses: actions/checkout@v7
        with:
          path: nightly-build

      - name: Mint GitHub App token (dozenos-rebrand checkout)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-rebrand

      - name: Checkout dozenos-rebrand
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-rebrand

      # NO merge-multiple here (unlike the deb download in build-image):
      # two subdirs may legitimately ship the SAME flavor name (the aws
      # install/upgrade split), and a merged flat directory would let
      # same-named files silently overwrite each other. Per-leg directories
      # turn any cross-leg filename collision into a loud release-upload
      # error instead.
      - name: Download all image artifacts from this run
        uses: actions/download-artifact@v8
        with:
          pattern: 'image-*'
          path: images

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Generate version.json, sign all artifacts, publish Release
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          gen_args=()
          pub_args=()
          for meta in images/*/meta.json; do
            dir=$(dirname "$meta")
            flavor=$(jq -r .flavor "$meta")
            subdir=$(jq -r .subdir "$meta")
            while IFS= read -r name; do
              path="$dir/$name"
              if [ ! -f "$path" ]; then
                echo "::error::artifact '$name' from $meta missing on disk" >&2
                exit 1
              fi
              # FLAVOR:SUBDIR:PATH -- the flavors/<subdir> becomes the
              # artifact's install_type in version.json (fresh-install vs
              # upgrade).
              gen_args+=(--artifact "$flavor:$subdir:$path")
              pub_args+=(--asset "$path")
            done < <(jq -r '.artifacts[]' "$meta")
          done
          if [ "${#pub_args[@]}" -eq 0 ]; then
            echo "::error::no image artifacts found under images/ -- nothing to publish" >&2
            exit 1
          fi
          dozenos-rebrand/release/gen-version-json.sh \
            --version "$VERSION" \
            "${gen_args[@]}" \
            --release-url "https://github.com/dozenos/dozenos-nightly-build/releases/download/${VERSION}" \
            --out nightly-build/version.json
          dozenos-rebrand/release/sign-and-publish.sh \
            "${pub_args[@]}" \
            --version-json nightly-build/version.json \
            --tag "$VERSION" \
            --repo dozenos/dozenos-nightly-build \
            --title "DozenOS nightly $VERSION"

      # Updates the stable "latest" version.json on the default branch (in
      # addition to the frozen copy attached to the Release above).
      - name: Commit version.json + mirror-state.json to default branch
        working-directory: nightly-build
        env:
          # The fingerprint check-changes OBSERVED at the start of this run.
          # Persisting THIS (not a fresh re-read) is deliberate: a mirror
          # that synced while this build was running must stay unrecorded so
          # the next tick rebuilds for it.
          MIRROR_SHAS: ${{ needs.check-changes.outputs.shas }}
        run: |
          set -euo pipefail
          git config user.name "DozenOS autobuild"
          git config user.email "autobuild@dozenos.local"
          # version.json was generated into this checkout by the publish
          # step -- stash a copy outside the worktree so the reset-to-remote
          # below cannot lose it.
          cp version.json "$RUNNER_TEMP/version.json"
          # Retry loop against a moved remote: this job's checkout is from
          # run start, but the branch legitimately moves during a multi-hour
          # run. Both files are whole-file regenerated from this run's own
          # data -- nothing is merged -- so: sync to the current remote tip,
          # re-write both files on top, push; on a lost race, retry.
          #
          # github.ref_name (not github.event.repository.default_branch):
          # the event payload's `repository` object is unset on `schedule`,
          # this workflow's unattended path; ref_name is always populated
          # and matches what the no-`ref:` checkout above checked out.
          for attempt in 1 2 3; do
            git fetch origin "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"
            cp "$RUNNER_TEMP/version.json" version.json
            printf '%s\n' "$MIRROR_SHAS" | jq -S . > mirror-state.json
            git add version.json mirror-state.json
            if git diff --cached --quiet; then
              echo "I: version.json + mirror-state.json unchanged, nothing to commit"
              exit 0
            fi
            git commit -m "chore: update version.json + mirror-state.json for ${VERSION}"
            if git push origin "HEAD:${{ github.ref_name }}"; then
              echo "I: commit-back pushed (attempt $attempt)"
              exit 0
            fi
            echo "W: push rejected (remote moved during run?) -- re-syncing and retrying ($attempt/3)"
          done
          echo "::error::commit-back failed after 3 attempts -- version.json/mirror-state.json on ${{ github.ref_name }} are stale (the Release itself already published fine); commit them manually or re-run this job" >&2
          exit 1

  # prune-deb-cache: keep the newest 3 entries per build unit on
  # dozenos/dozenos-deb-cache, delete the rest (tags included). Runs only
  # after a successful publish, and pruning must never be able to fail a
  # nightly -- hence continue-on-error on every step. Keeping 3 (not 1)
  # covers a mid-day rebuild-dispatch store plus the entry still referenced
  # by a possible next-tick re-run.
  prune-deb-cache:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token (deb-cache prune)
        id: cache_token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-rebrand,dozenos-deb-cache

      - name: Checkout dozenos-rebrand
        if: steps.cache_token.outcome == 'success'
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand
          token: ${{ steps.cache_token.outputs.token }}
          path: dozenos-rebrand

      - name: Prune deb cache (keep newest 3 per unit)
        if: steps.cache_token.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.cache_token.outputs.token }}
        run: dozenos-rebrand/release/deb-cache.sh prune --keep 3

  # prune-releases: keep the newest 15 *-rolling releases (the download
  # page lists exactly 15), delete older ones with their tags. "Newest" is
  # judged by release id -- created_at is the tagged commit's date, not the
  # publish time, so it cannot order releases. Non-rolling tags are exempt.
  prune-releases:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Prune rolling releases (keep newest 15)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --paginate "repos/${{ github.repository }}/releases" \
            --jq '.[] | "\(.id)\t\(.tag_name)"' \
            | sort -k1,1 -rn | cut -f2 | { grep -- '-rolling$' || true; } \
            | tail -n +16 | while IFS= read -r tag; do
                echo "I: pruning release $tag"
                gh release delete "$tag" --repo "${{ github.repository }}" \
                  --yes --cleanup-tag \
                  || echo "::warning::failed to delete release $tag (continuing)"
              done
